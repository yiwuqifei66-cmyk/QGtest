<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工艺与工序拖拽编排平台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left_1 box">
            <div class="title_box">
                <div class="title">
                    <h2>标准工艺库</h2>
                    <p>拖拽进右侧编辑区</p>
                </div>
            </div>
            
            <ul class="list_1">
                <li class="drag">原料切割</li>
                <li class="drag">粗加工</li>
                <li class="drag">精加工</li>
                <li class="drag">表面处理</li>
                <li class="drag">质量检测</li>
                <li class="drag">包装入库</li>
            </ul>
        </div>
        <div class="left_2 box">
            <div class="title_box">
                <div class="title">
                    <h2>工艺列表</h2>
                    <button>新建工艺</button>
                </div>
            </div>
           
            
            <ul class="list_2">
                
            </ul>
            <div class="delete">删除当前工艺</div>
        </div>
        <div class="right box">
            <div class="title_box">
                <div class="title">
                    <h2>未定义</h2>
                </div>
            </div>
            <div class="create_box">
                <div class="create">
                    <ul class="create_list"></ul>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
        
</body>
</html>
